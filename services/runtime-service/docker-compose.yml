version: '3.8'
services:
  runtime-service:
    build: .
    ports:
      - "8081:8081"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - API_KEYS=devkey
      - EXECUTOR_IMAGE=python:3.12-slim
      - EXECUTOR_MEMORY_MB=256
      - EXECUTOR_CPUS=1.0
      - EXECUTOR_PIDS_LIMIT=64
